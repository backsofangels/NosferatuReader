plugins {
    alias(libs.plugins.android.application)
    alias(libs.plugins.kotlin.android)
    alias(libs.plugins.ksp)
    alias(libs.plugins.kotlin.compose)
}

// JaCoCo for unit test coverage reporting
apply plugin: 'jacoco'

jacoco {
    toolVersion = "0.8.10"
}

android {
    namespace 'com.nosferatu.launcher'
    compileSdkVersion 36

    defaultConfig {
        applicationId "com.nosferatu.launcher"
        minSdkVersion 25
        targetSdkVersion 36
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        ksp {
            arg("room.schemaLocation", "$projectDir/schemas")
        }
    }

    buildFeatures {
        compose = true
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    testOptions {
        unitTests.all {
            // Byte Buddy in the Mockito inline mock maker needs this on Java 21
            it.jvmArgs += '-Dnet.bytebuddy.experimental=true'
        }
    }
}

dependencies {
    implementation(platform(libs.androidx.compose.bom))

    implementation libs.androidx.runtime
    implementation libs.lifecycle.runtime.compose
    implementation libs.androidx.compose.material3
    implementation libs.androidx.compose.foundation
    implementation libs.androidx.navigation.runtime.ktx
    implementation libs.androidx.compose.foundation.layout
    implementation libs.androidx.foundation
    implementation libs.androidx.compose.runtime

    // Desugaring per supporto Java 8+ su vecchi dispositivi
    coreLibraryDesugaring libs.android.desugar

    // Metadata & Parsing
    implementation(libs.epublib.core) {
        exclude group: 'org.slf4j'
        exclude group: 'xmlpull'
    }
    implementation libs.slf4j.android

    // Readium Stack
    implementation libs.readium.shared
    implementation libs.readium.streamer
    implementation libs.readium.navigator
    implementation libs.readium.adapter.pdfium

    // Database: Room
    implementation libs.androidx.room.runtime
    implementation libs.androidx.room.ktx
    ksp libs.androidx.room.compiler

    // UI & Lifecycle
    implementation libs.androidx.recyclerview
    implementation libs.androidx.appcompat
    implementation libs.google.material
    implementation(libs.androidx.ui)
    implementation(libs.androidx.material3)
    implementation(libs.androidx.activity.compose)
    implementation(libs.androidx.lifecycle.runtime.compose)
    implementation(libs.androidx.lifecycle.viewmodel.compose)
    implementation(libs.coil.compose)
    implementation(libs.androidx.documentfile)
    //implementation(libs.readium.streamer.parser.epub)

    // Coroutines
    implementation libs.kotlinx.coroutines.core
    implementation libs.kotlinx.coroutines.android

    // Unit test dependencies
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.7.3'
    testImplementation 'org.mockito:mockito-core:4.11.0'
    testImplementation 'org.mockito:mockito-inline:4.11.0'
    testImplementation 'org.mockito.kotlin:mockito-kotlin:4.1.0'
    // Instrumented UI test dependencies
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test:rules:1.5.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    androidTestImplementation 'androidx.test.espresso:espresso-intents:3.5.1'
    // Use Compose BOM for androidTest to resolve compose test artifact versions
    androidTestImplementation platform(libs.androidx.compose.bom)
    androidTestImplementation 'androidx.compose.ui:ui-test-junit4'
    androidTestImplementation 'androidx.test.uiautomator:uiautomator:2.2.0'
    debugImplementation 'androidx.compose.ui:ui-tooling'
    // Robolectric for JVM Android unit tests and Room testing helpers
    testImplementation 'androidx.test:core:1.5.0'
    testImplementation 'org.robolectric:robolectric:4.10.3'
    testImplementation 'androidx.room:room-testing:2.8.4'
}

// Configure a simple JaCoCo report task for the debug unit tests
task jacocoTestReport(type: JacocoReport) {
    dependsOn 'testDebugUnitTest'
    group = "Reporting"
    description = "Generate Jacoco coverage reports for debug unit tests"

    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }

    def fileFilter = ['**/R.class', '**/R$*.class', '**/BuildConfig.*', '**/Manifest*.*', '**/*Test*.*']

    def kotlinClassesDir = fileTree(dir: "${buildDir}/tmp/kotlin-classes/debug", excludes: fileFilter)
    def javaClassesDir = fileTree(dir: "${buildDir}/intermediates/javac/debug/classes", excludes: fileFilter)
    classDirectories.setFrom(files([kotlinClassesDir, javaClassesDir]))

    sourceDirectories.setFrom(files(['src/main/java', 'src/main/kotlin']))

    executionData.setFrom(fileTree(dir: project.buildDir, includes: [
        'jacoco/testDebugUnitTest.exec',
        'outputs/unit_test_code_coverage/debugUnitTest/*',
        'testDebugUnitTest.exec'
    ]))
}